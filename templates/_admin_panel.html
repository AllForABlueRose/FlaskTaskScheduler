<div id="adminTrigger"
     class="fixed top-3 left-1/2 -translate-x-1/2 bg-slate-900 text-white w-7 h-7 rounded-full shadow z-20 flex items-center justify-center opacity-10 hover:opacity-30 cursor-grab transition-opacity select-none">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5">
        <path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 00-5.25 5.25v3a3 3 0 00-3 3v6.75a3 3 0 003 3h10.5a3 3 0 003-3v-6.75a3 3 0 00-3-3v-3c0-2.9-2.35-5.25-5.25-5.25zm3.75 8.25v-3a3.75 3.75 0 10-7.5 0v3h7.5z" clip-rule="evenodd" />
    </svg>
</div>

<div id="adminPanel" class="hidden fixed inset-0 bg-slate-900/95 z-40 overflow-auto p-6">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow p-6">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold">Admin · Users</h2>
            <button onclick="closeAdminPanel()" class="bg-slate-200 px-3 py-1 rounded">Close</button>
        </div>

        <h3 class="font-semibold text-lg mb-2">Pending requests</h3>
        <div id="pendingUsers" class="mb-6 space-y-2"></div>

        <h3 class="font-semibold text-lg mb-2">Active users</h3>
        <div id="activeUsers" class="space-y-2"></div>
    </div>
</div>

<div id="resetPasswordModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-[420px] shadow-2xl">
        <div class="space-y-3">
            <h2 class="text-xl font-bold">Reset password</h2>
            <div id="resetPasswordTarget" class="text-sm text-slate-600"></div>
            <input id="resetPasswordInput" type="text" class="border p-2 rounded w-full" placeholder="New password" autocomplete="off">
            <div id="resetPasswordError" class="text-red-600 text-sm hidden"></div>
            <button onclick="submitResetPassword()" class="bg-green-600 text-white p-2 rounded w-full">Save</button>
            <button onclick="closeResetPassword()" class="w-full bg-slate-200 text-slate-900 p-2 rounded">Close</button>
        </div>
    </div>
</div>
