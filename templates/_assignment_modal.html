<div id="assignmentModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-40">
    <div class="bg-white rounded-2xl p-6 w-96 shadow-2xl space-y-4">
        <h2 id="assignmentModalTitle" class="text-xl font-bold">Create Assignment</h2>
        <div>
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Project Code</label>
            <input id="assignmentCode" class="border p-2 rounded w-full mt-1" placeholder="e.g. PRJ-001">
        </div>
        <div>
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Title</label>
            <input id="assignmentTitle" class="border p-2 rounded w-full mt-1" placeholder="Assignment title">
        </div>
        <div>
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Color</label>
            <input id="assignmentColor" type="color" value="#64748b" class="w-10 h-8 border rounded cursor-pointer mt-1">
        </div>
        <div class="flex gap-2">
            <button onclick="saveAssignment()" class="flex-1 bg-slate-900 text-white p-2 rounded-lg">Save</button>
            <button onclick="closeAssignmentModal()" class="flex-1 bg-slate-200 text-slate-900 p-2 rounded-lg">Close</button>
        </div>
        <button id="assignmentDeleteBtn" onclick="deleteAssignment()" class="w-full bg-red-100 text-red-700 p-2 rounded-lg text-sm hidden">Delete</button>
    </div>
</div>
